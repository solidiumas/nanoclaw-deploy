version: "3.9"

services:
  nanoclaw:
    build: .
    container_name: nanoclaw
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env
    command: sh -c "npm install && npm start"

  redis:
    image: redis:7
    container_name: nanoclaw-redis
    restart: unless-stopped
