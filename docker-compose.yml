services:
  nanoclaw-app:
    image: ghcr.io/solidiumas/nanoclaw-app:latest
    container_name: nanoclaw_web
    restart: always
    ports:
      - "80:80"
    # Gir appen tilgang til Docker på hosten hvis den skal styre containere
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - nanoclaw_network

  nanoclaw-agent:
    image: ghcr.io/solidiumas/nanoclaw-agent:latest
    container_name: nanoclaw_agent
    restart: always
    privileged: true
    networks:
      - nanoclaw_network

networks:
  nanoclaw_network:
    driver: bridge
